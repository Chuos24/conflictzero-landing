<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.svg">
  <title>Conflict Zero - Solicitar Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --gold: #c9a961;
            --gold-light: #e8d5a3;
            --text: #f5f5f5;
            --text-muted: #888;
            --border: #2a2a2a;
            --error: #dc3545;
            --success: #28a745;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 24px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg {
            width: 22px;
            height: 22px;
            stroke: var(--gold);
            stroke-width: 1.5;
            fill: none;
        }
        
        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 2px;
        }
        
        .logo-text span {
            color: var(--gold);
            font-weight: 400;
        }
        
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--gold);
        }
        
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 48px;
        }
        
        .register-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .register-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .register-header p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .form-group input::placeholder {
            color: #555;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .message.error {
            display: block;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b6b;
        }
        
        .message.success {
            display: block;
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #4ade80;
        }
        
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: var(--bg-dark);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        
        .btn-submit:hover:not(:disabled) {
            background: var(--gold-light);
        }
        
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .register-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        
        .register-footer p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .register-footer a {
            color: var(--gold);
            text-decoration: none;
        }
        
        .register-footer a:hover {
            text-decoration: underline;
        }
        
        .footer {
            padding: 24px 48px;
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
        }
        
        @media (max-width: 640px) {
            .header {
                padding: 16px 24px;
            }
            
            .main {
                padding: 24px;
            }
            
            .register-card {
                padding: 32px 24px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div class="logo-text">Conflict <span>Zero</span></div>
        </a>
        
        <a href="/" class="back-link">← Volver</a>
    </header>
    
    <main class="main">
        <div class="register-card">
            <div class="register-header">
                <h1>Solicitar Acceso</h1>
                <p>Complete el formulario para solicitar membresía</p>
            </div>
            
            <div class="message" id="message"></div>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="firstName" placeholder="Juan" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Apellido</label>
                        <input type="text" id="lastName" placeholder="Pérez" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" placeholder="juan@empresa.com" required>
                </div>
                
                <div class="form-group">
                    <label>Empresa</label>
                    <input type="text" id="company" placeholder="Nombre de su empresa" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Plan</label>
                        <select id="plan" required>
                            <option value="">Seleccionar...</option>
                            <option value="starter">Starter - $400/mes</option>
                            <option value="professional">Professional - $800/mes</option>
                            <option value="enterprise">Enterprise - $2,500/mes</option>
                        </select>
                    </div>
                    
                    
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" id="phone" placeholder="+51 999 999 999">
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">
                    Enviar Solicitud
                </button>
            </form>
            
            <div class="register-footer">
                <p>¿Ya tiene cuenta? <a href="/login.html">Iniciar sesión</a></p>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <p>© 2026 Conflict Zero. Todos los derechos reservados.</p>
    </footer>
    
    <script>
        // Get plan from URL
        const urlParams = new URLSearchParams(window.location.search);
        const planParam = urlParams.get('plan');
        const rucParam = urlParams.get('ruc');
        const scoreParam = urlParams.get('score');
        const sealParam = urlParams.get('seal');
        const companyParam = urlParams.get('company');
        
        if (planParam) {
            document.getElementById('plan').value = planParam;
        }
        
        if (companyParam) {
            document.getElementById('company').value = decodeURIComponent(companyParam);
        }
        
        // Mostrar info del RUC si existe
        if (rucParam) {
            const card = document.querySelector('.register-card');
            const infoDiv = document.createElement('div');
            infoDiv.style.cssText = 'background: rgba(201, 169, 97, 0.1); border: 1px solid var(--gold); border-radius: 8px; padding: 16px; margin-bottom: 24px;';
            infoDiv.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                    <div>
                        <div style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">RUC Verificado</div>
                        <div style="font-size: 18px; font-weight: 500; color: var(--gold);">${rucParam}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">Score</div>
                        <div style="font-size: 24px; font-weight: 600; color: var(--gold);">${scoreParam || '--'}</div>
                    </div>
                </div>
                ${sealParam ? `<div style="margin-top: 12px; text-align: center;"><span style="background: var(--gold); color: var(--bg-dark); padding: 4px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; text-transform: uppercase;">${sealParam}</span></div>` : ''}
            `;
            card.insertBefore(infoDiv, card.querySelector('.register-header').nextSibling);
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            
            // Get form data
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const company = document.getElementById('company').value;
            const plan = document.getElementById('plan').value;
            const phone = document.getElementById('phone').value;
            
            // Mapear plan para display
            const planDisplayNames = {
                'starter': 'Bronze',
                'bronze': 'Bronze',
                'essential': 'Bronze',
                'professional': 'Silver',
                'silver': 'Silver',
                'enterprise': 'Gold',
                'gold': 'Gold'
            };
            
            const displayPlan = planDisplayNames[plan] || plan;
            
            // Generar contraseña temporal
            const tempPassword = 'Temp' + Math.random().toString(36).substring(2, 10) + '!';
            
            // Datos para API - Formato FrontendRegisterRequest
            const data = {
                firstName: firstName,
                lastName: lastName,
                email: email,
                company: company,
                plan: plan,
                phone: phone,
                date: new Date().toISOString()
            };
            
            btn.disabled = true;
            btn.textContent = 'Enviando...';
            msg.className = 'message';
            
            try {
                // 1. Crear usuario (quedará en estado pending)
                const response = await fetch('https://conflict-zero-api.onrender.com/api/v3/auth/register-web', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok || response.status === 409) {
                    // 2. Notificar al admin
                    await fetch('https://conflict-zero-api.onrender.com/api/v3/notify-admin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            ruc: rucParam || data.ruc,
                            empresa: company,
                            plan: displayPlan,
                            email: email,
                            phone: phone,
                            nombre: firstName + ' ' + lastName,
                            score: scoreParam || 'N/A',
                            admin_email: 'tiagomunoz10@icloud.com',
                            timestamp: new Date().toISOString()
                        })
                    }).catch(err => console.log('Notify admin error (non-critical):', err));
                    
                    // 3. Redirigir a gracias-postulacion
                    const ref = 'CZ-' + Math.floor(Math.random() * 900 + 100);
                    window.location.href = `/gracias-postulacion.html?ref=${ref}&ruc=${rucParam || data.ruc}`;
                    return;
                } else {
                    throw new Error(result.detail || 'Error en el servidor');
                }
            } catch (error) {
                console.error('Registration error:', error);
                msg.className = 'message error';
                msg.textContent = 'Error al enviar la solicitud. Por favor intenta nuevamente o contacta soporte.';
            }
            
            btn.disabled = false;
            btn.textContent = 'Enviar Solicitud';
        }
    </script>
</body>
</html>
