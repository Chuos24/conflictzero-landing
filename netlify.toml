[build]
  command = "echo 'Static files only - no build needed'"
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "https://conflict-zero-api.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "https://www.czperu.com/*"
  to = "https://czperu.com/:splat"
  status = 301
  force = true
