<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conflict Zero - Acceso</title>
</head>
<body style="background:#0a0a0a;color:#f5f5f5;font-family:Inter,sans-serif;margin:0;min-height:100vh;display:flex;flex-direction:column;">
    <header style="padding:24px 48px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a2a;">
        <a href="index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:#f5f5f5;">
            <div style="width:40px;height:40px;border:2px solid #c9a961;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#c9a961;font-weight:700;font-size:14px;">CZ</div>
            <span style="font-size:24px;font-weight:600;letter-spacing:2px;">CONFLICT<span style="color:#c9a961;font-weight:400;">ZERO</span></span>
        </a>
        <a href="index.html" style="color:#888;text-decoration:none;font-size:14px;">← Volver al sitio</a>
    </header>
    
    <main style="flex:1;display:flex;justify-content:center;align-items:center;padding:48px;">
        <div style="background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:48px;width:100%;max-width:420px;">
            <div style="text-align:center;margin-bottom:32px;">
                <h1 style="font-size:32px;font-weight:500;margin-bottom:8px;letter-spacing:1px;">Acceso de Miembros</h1>
                <p style="color:#888;font-size:14px;">Ingrese sus credenciales para continuar</p>
            </div>
            
            <div id="errorMessage" style="display:none;background:rgba(220,53,69,0.1);border:1px solid #dc3545;border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#ff6b6b;font-size:13px;"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div style="margin-bottom:20px;">
                    <label style="display:block;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:#888;margin-bottom:8px;">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="usuario@empresa.com" required autocomplete="email"
                        style="width:100%;padding:14px 16px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;color:#f5f5f5;font-size:15px;box-sizing:border-box;"
                    >
                </div>
                
                <div style="margin-bottom:20px;">
                    <label style="display:block;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:#888;margin-bottom:8px;">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"
                        style="width:100%;padding:14px 16px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;color:#f5f5f5;font-size:15px;box-sizing:border-box;"
                    >
                </div>
                
                <button type="submit" id="submitBtn"
                    style="width:100%;padding:16px;background:#c9a961;border:none;border-radius:8px;color:#0a0a0a;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;"
                >Acceder</button>
            </form>
            
            <div style="text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid #2a2a2a;">
                <p style="color:#888;font-size:13px;">¿No tiene cuenta? <a href="index.html#contact" style="color:#c9a961;text-decoration:none;">Solicitar acceso</a></p>
            </div>
        </div>
    </main>
    
    <footer style="padding:24px 48px;text-align:center;border-top:1px solid #2a2a2a;">
        <p style="color:#888;font-size:13px;">© 2026 Conflict Zero. Todos los derechos reservados.</p>
    </footer>
    
    <script>
        const API_BASE = 'https://conflictzero-api.onrender.com/api/v1';
        
        const token = localStorage.getItem('cz_token');
        if (token) {
            fetch(\`\${API_BASE}/auth/me\`, {
                headers: { 'Authorization': \`Bearer \${token}\` }
            }).then(r => {
                if (r.ok) window.location.href = 'panel.html';
            }).catch(() => {});
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('errorMessage');
            
            btn.disabled = true;
            btn.textContent = 'Verificando...';
            error.style.display = 'none';
            
            try {
                const response = await fetch(\`\${API_BASE}/auth/login\`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Credenciales incorrectas');
                }
                
                localStorage.setItem('cz_token', data.access_token);
                localStorage.setItem('cz_user', JSON.stringify({
                    email: email,
                    loginTime: new Date().toISOString()
                }));
                
                window.location.href = 'panel.html';
                
            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Acceder';
            }
        }
    </script>
</body>
</html>
