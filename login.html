<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conflict Zero - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --gold: #c9a961;
            --gold-light: #e8d5a3;
            --text: #f5f5f5;
            --text-muted: #888;
            --border: #2a2a2a;
            --error: #dc3545;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            padding: 24px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-weight: 700;
            font-size: 14px;
        }
        
        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 2px;
        }
        
        .logo-text span {
            color: var(--gold);
            font-weight: 400;
        }
        
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--gold);
        }
        
        /* Main */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 48px;
        }
        
        /* Login Card */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            position: relative;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .form-group input::placeholder {
            color: #555;
        }
        
        /* Error Message */
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .error-message.visible {
            display: block;
        }
        
        /* Button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: var(--bg-dark);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .btn-submit:hover:not(:disabled) {
            background: var(--gold-light);
        }
        
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--bg-dark);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        
        .login-footer p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .login-footer a {
            color: var(--gold);
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        /* Page Footer */
        .footer {
            padding: 24px 48px;
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
        }
        
        @media (max-width: 640px) {
            .header {
                padding: 16px 24px;
            }
            
            .main {
                padding: 24px;
            }
            
            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <div class="logo-icon">CZ</div>
            <div class="logo-text">Conflict <span>Zero</span></div>
        </a>
        
        <a href="/" class="back-link">← Volver</a>
    </header>
    
    <main class="main">
        <div class="login-card">
            <div class="login-header">
                <h1>Bienvenido</h1>
                <p>Ingrese sus credenciales para acceder</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="usuario@empresa.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">
                    Acceder
                </button>
            </form>
            
            <div class="login-footer">
                <p>¿No tiene cuenta? <a href="/register">Solicitar acceso</a></p>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <p>© 2026 Conflict Zero. Todos los derechos reservados.</p>
    </footer>
    
    <script>
        const API_BASE = 'https://conflictzero-backend1.onrender.com';
        
        // Check if already logged in
        const token = localStorage.getItem('cz_token');
        if (token) {
            fetch(`${API_BASE}/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(r => {
                if (r.ok) window.location.href = '/dashboard.html';
            }).catch(() => {});
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('errorMessage');
            
            btn.disabled = true;
            btn.innerHTML = 'Verificando... <span class="spinner"></span>';
            error.classList.remove('visible');
            
            // Validar credenciales
            const VALID_USERS = [
                { email: 'founder@conflictzero.com', password: 'CZ2025!' },
                { email: 'admin@czperu.com', password: 'Admin2025!' },
                { email: 'demo@czperu.com', password: 'Demo2025!' }
            ];
            
            const user = VALID_USERS.find(u => u.email === email && u.password === password);
            
            if (!user) {
                error.textContent = 'Credenciales incorrectas. Acceso exclusivo para miembros.';
                error.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Acceder';
                return;
            }
            
            // Login exitoso
            localStorage.setItem('cz_user', JSON.stringify({
                email: email,
                loginTime: new Date().toISOString(),
                plan: email === 'founder@conflictzero.com' ? 'ENTERPRISE' : 'STARTER'
            }));
            
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 600);
        }
    </script>
</body>
</html>
