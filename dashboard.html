<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Institucional - Conflict Zero</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0A0A0F;
            --bg-card: #12121A;
            --bg-hover: #1A1A22;
            --gold: #C5A059;
            --gold-light: #D4AF37;
            --text: #F5F5F0;
            --text-muted: #A0A0A0;
            --border: #2A2A2E;
            --border-gold: rgba(197, 160, 89, 0.3);
            --success: #1B3A2F;
            --danger: #8B0000;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            background-color: var(--bg-dark);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Header UHNW */
        .header {
            padding: 20px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--gold);
            stroke-width: 1.5;
            fill: none;
        }
        
        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .plan-badge {
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 8px 16px;
            border: 1px solid var(--gold);
        }
        
        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-logout:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 48px;
        }
        
        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: var(--text);
            margin-bottom: 40px;
        }
        
        /* Stats */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 32px;
            text-align: center;
            transition: border-color 0.2s;
        }
        
        .stat-box:hover {
            border-color: var(--border-gold);
        }
        
        .stat-label {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 300;
            color: var(--gold);
        }
        
        /* Sections */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 32px;
            margin-bottom: 24px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .section-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
        }
        
        .btn-primary {
            background: var(--gold);
            border: none;
            color: var(--bg-dark);
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary:hover {
            background: var(--gold-light);
        }
        
        /* Validador */
        .input-group {
            display: flex;
            gap: 0;
        }
        
        .input-group input {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 16px 20px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .input-group input:focus {
            border-color: var(--gold);
        }
        
        .input-group input::placeholder {
            color: var(--text-muted);
        }
        
        /* Tabla */
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        
        tr:hover td {
            background: var(--bg-hover);
        }
        
        .tier-badge-table {
            display: inline-block;
            padding: 4px 12px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        .tier-GOLD { background: rgba(212, 175, 55, 0.2); color: #D4AF37; }
        .tier-SILVER { background: rgba(192, 192, 192, 0.2); color: #C0C0C0; }
        .tier-BRONZE { background: rgba(184, 115, 51, 0.2); color: #B87333; }
        .tier-RECHAZADO { background: rgba(139, 0, 0, 0.2); color: #8B0000; }
        
        /* Resultados */
        .result-box {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 32px;
            margin-top: 24px;
            display: none;
        }
        
        .result-box.visible {
            display: block;
        }
        
        .score-display {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .score-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 64px;
            font-weight: 300;
            color: var(--gold);
        }
        
        .score-label {
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div class="logo-text">Conflict Zero</div>
        </a>
        
        <div class="user-menu">
            <span class="plan-badge">Plan Profesional</span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesion</button>
        </div>
    </header>
    
    <main class="main">
        <div class="page-title">Panel de Control Institucional</div>
        <div class="page-subtitle">Constructora Zamora Jara SAC</div>
        
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-label">Verificaciones</div>
                <div class="stat-value">1,247</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Score Promedio</div>
                <div class="stat-value">67.3</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Red de Cumplimiento</div>
                <div class="stat-value">6</div>
            </div>
        </div>
        
        <!-- Validador -->
        <div class="section">
            <div class="section-header">
                <h2>Validar Empresa</h2>
            </div>
            
            <div class="input-group">
                <input type="text" id="rucInput" placeholder="Ingrese RUC (11 digitos)" maxlength="11">
                <button class="btn-primary" onclick="validarRUC()">Verificar</button>
            </div>
            
            <div class="result-box" id="resultBox">
                <div class="score-display">
                    <div class="score-number" id="scoreNum">--</div>
                    <div class="score-label">SCORE CONFLICT ZERO</div>
                </div>
            </div>
        </div>
        
        <!-- Accesos -->
        <div class="section">
            <div class="section-header">
                <h2>Accesos Directos</h2>
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
                <a href="/red.html" class="btn-primary" style="text-align: center; text-decoration: none; display: block;">Ver Red de Cumplimiento</a>
                <button class="btn-primary" onclick="invitarSubcontratista()">Invitar al Comite</button>
            </div>
        </div>
    </main>
    
    <script>
        // Check auth
        const token = localStorage.getItem('cz_token');
        if (!token) {
            window.location.href = '/login.html';
        }
        
        function logout() {
            localStorage.removeItem('cz_token');
            localStorage.removeItem('cz_user');
            window.location.href = '/';
        }
        
        async function validarRUC() {
            const ruc = document.getElementById('rucInput').value;
            const resultBox = document.getElementById('resultBox');
            const scoreNum = document.getElementById('scoreNum');
            
            if (ruc.length !== 11) {
                alert('Ingrese un RUC valido de 11 digitos');
                return;
            }
            
            try {
                const response = await fetch(`https://conflict-zero-api.onrender.com/api/v3/validate/${ruc}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    scoreNum.textContent = Math.round(data.score || 0);
                    resultBox.classList.add('visible');
                } else {
                    alert(data.detail || 'Error al validar');
                }
            } catch (err) {
                alert('Error de conexion');
            }
        }
        
        function invitarSubcontratista() {
            alert('Funcion de invitacion - en desarrollo');
        }
    </script>
</body>
</html>
