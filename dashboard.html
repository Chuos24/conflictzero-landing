<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conflict Zero - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e8e6e3;
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            border-bottom: 1px solid #1a1a1a;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #e8e6e3;
        }
        
        .logo-icon {
            width: 28px;
            height: 28px;
            color: #c9a050;
        }
        
        .logo-text {
            font-size: 16px;
            letter-spacing: 0.15em;
            font-weight: 300;
            text-transform: uppercase;
        }
        
        .nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        .nav-link {
            font-size: 13px;
            color: #8a8a8a;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .nav-link:hover {
            color: #e8e6e3;
        }
        
        .btn-logout {
            background: transparent;
            border: 1px solid #c9a050;
            color: #c9a050;
            padding: 10px 20px;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-logout:hover {
            background: #c9a050;
            color: #0a0a0a;
        }
        
        /* Main */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 32px;
        }
        
        /* Page header */
        .page-header {
            margin-bottom: 48px;
        }
        
        .page-tag {
            color: #c9a050;
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 300;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 48px;
        }
        
        .stat-card {
            border: 1px solid #1a1a1a;
            padding: 32px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 300;
            color: #c9a050;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8a8a8a;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        .panel {
            border: 1px solid #1a1a1a;
            padding: 32px;
        }
        
        .panel-header {
            margin-bottom: 24px;
        }
        
        .panel-title {
            font-size: 14px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 400;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #8a8a8a;
            margin-bottom: 10px;
        }
        
        .form-input {
            width: 100%;
            background: transparent;
            border: 1px solid #2a2a2a;
            padding: 14px 16px;
            color: #e8e6e3;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #c9a050;
        }
        
        .btn-primary {
            width: 100%;
            background: #c9a050;
            color: #0a0a0a;
            border: none;
            padding: 16px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #d4aa5a;
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* User Info */
        .user-info {
            space-y: 16px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-size: 13px;
            color: #8a8a8a;
        }
        
        .info-value {
            font-size: 13px;
            color: #e8e6e3;
        }
        
        .plan-badge {
            display: inline-block;
            background: #c9a050;
            color: #0a0a0a;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 48px;
            color: #8a8a8a;
        }
        
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid #1a1a1a;
            border-top-color: #c9a050;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Result */
        .result-box {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            padding: 24px;
            margin-top: 24px;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            font-size: 12px;
            color: #8a8a8a;
        }
        
        .result-value {
            font-size: 13px;
            color: #e8e6e3;
            text-align: right;
        }
        
        .result-value.good {
            color: #4ade80;
        }
        
        .result-value.bad {
            color: #ef4444;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
            .nav {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span class="logo-text">Conflict Zero</span>
            </a>
            
            <nav class="nav">
                <a href="/" class="nav-link">Inicio</a>
                <a href="/pricing" class="nav-link">Planes</a>
                <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="page-header">
            <p class="page-tag">Panel de Control</p>
            <h1 class="page-title">Bienvenido</h1>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-value" id="statQueries">-</p>
                <p class="stat-label">Consultas Realizadas</p>
            </div>
            <div class="stat-card">
                <p class="stat-value" id="statLimit">-</p>
                <p class="stat-label">Límite Mensual</p>
            </div>
            <div class="stat-card">
                <p class="stat-value" id="statRemaining">-</p>
                <p class="stat-label">Consultas Disponibles</p>
            </div>
            <div class="stat-card">
                <p class="stat-value" id="statScore">-</p>
                <p class="stat-label">Score Promedio</p>
            </div>
        </div>

        <div class="content-grid">
            <!-- User Info -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">Información de Cuenta</h2>
                </div>
                
                <div id="userInfoLoading">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Cargando...</p>
                    </div>
                </div>
                
                <div id="userInfo" style="display: none;">
                    <div class="info-row">
                        <span class="info-label">Email</span>
                        <span class="info-value" id="userEmail">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Plan</span>
                        <span class="info-value"><span class="plan-badge" id="userPlan">-</span></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Estado</span>
                        <span class="info-value" id="userStatus">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Miembro desde</span>
                        <span class="info-value" id="userSince">-</span>
                    </div>
                </div>
            </div>

            <!-- RUC Verify -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">Verificar RUC</h2>
                </div>
                
                <form id="rucForm" onsubmit="verifyRUC(event)">
                    <div class="form-group">
                        <label class="form-label">Número de RUC</label>
                        <input type="text" id="rucInput" class="form-input" placeholder="20100047218" maxlength="11" pattern="[0-9]{11}" required>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="verifyBtn">Verificar</button>
                </form>
                
                <div id="rucResult"></div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'https://conflictzero-api.onrender.com/api/v1';
        
        // Check auth
        const token = localStorage.getItem('cz_token');
        if (!token) {
            window.location.href = '/login.html';
        }
        
        // Load user data
        async function loadUserData() {
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        logout();
                        return;
                    }
                    throw new Error('Error loading data');
                }
                
                const data = await response.json();
                
                // Update stats
                document.getElementById('statQueries').textContent = data.queries_used || 0;
                document.getElementById('statLimit').textContent = data.query_limit || 100;
                document.getElementById('statRemaining').textContent = 
                    (data.query_limit || 100) - (data.queries_used || 0);
                document.getElementById('statScore').textContent = data.avg_score || '-';
                
                // Update user info
                document.getElementById('userEmail').textContent = data.email;
                document.getElementById('userPlan').textContent = data.plan || 'Starter';
                document.getElementById('userStatus').textContent = data.is_active ? 'Activo' : 'Inactivo';
                document.getElementById('userSince').textContent = 
                    new Date(data.created_at).toLocaleDateString('es-PE');
                
                document.getElementById('userInfoLoading').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
                
            } catch (err) {
                console.error(err);
            }
        }
        
        async function verifyRUC(e) {
            e.preventDefault();
            
            const ruc = document.getElementById('rucInput').value;
            const btn = document.getElementById('verifyBtn');
            const resultDiv = document.getElementById('rucResult');
            
            btn.disabled = true;
            btn.textContent = 'Verificando...';
            resultDiv.innerHTML = '';
            
            try {
                const response = await fetch(`${API_BASE}/verify/ruc/${ruc}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Error en verificación');
                }
                
                resultDiv.innerHTML = `
                    <div class="result-box">
                        <div class="result-item">
                            <span class="result-label">RUC</span>
                            <span class="result-value">${data.ruc || ruc}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Razón Social</span>
                            <span class="result-value">${data.razon_social || 'N/A'}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Estado</span>
                            <span class="result-value ${data.estado === 'ACTIVO' ? 'good' : 'bad'}">${data.estado || 'N/A'}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Condición</span>
                            <span class="result-value">${data.condicion || 'N/A'}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Dirección</span>
                            <span class="result-value">${data.direccion || 'N/A'}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Score de Riesgo</span>
                            <span class="result-value ${(data.score || 0) > 70 ? 'good' : 'bad'}">${data.score || '-'}/100</span>
                        </div>
                    </div>
                `;
                
                // Reload stats
                loadUserData();
                
            } catch (err) {
                resultDiv.innerHTML = `
                    <div class="result-box">
                        <div class="result-item">
                            <span class="result-value bad">Error: ${err.message}</span>
                        </div>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verificar';
            }
        }
        
        function logout() {
            localStorage.removeItem('cz_token');
            localStorage.removeItem('cz_user');
            window.location.href = '/login.html';
        }
        
        // Load data on page load
        loadUserData();
    </script>
</body>
</html>
