    <script>
        // ============================================================
        // DEFINICIONES DE FUNCIONES (ninguna se ejecuta todavia)
        // ============================================================
        
        async function loadUserInfo(token) {
            try {
                const response = await fetch('https://conflict-zero-api.onrender.com/api/v3/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.company_name) {
                        document.getElementById('companyName').textContent = data.company_name;
                    } else if (data.email) {
                        document.getElementById('companyName').textContent = data.email;
                    }
                }
            } catch (err) {
                console.error('Error loading user:', err);
                if (typeof Sentry !== 'undefined') {
                    Sentry.captureException(err);
                }
            }
        }
        
        async function loadDashboardStats(token, isDemo) {
            try {
                if (isDemo) {
                    const demoData = {
                        monthly_validations: [
                            { mes: '2026-01', total: 12 },
                            { mes: '2026-02', total: 18 },
                            { mes: '2026-03', total: 25 },
                            { mes: '2026-04', total: 8 }
                        ],
                        total_last_30d: 8,
                        unique_rucs_30d: 6,
                        tier_distribution: { GOLD: 3, SILVER: 2, BRONZE: 2, RECHAZADO: 1 },
                        recent_validations: [
                            { ruc: '20100123091', razon_social: 'Constructora Alpha SAC', score: 95, tier: 'GOLD', fecha: '2026-04-15T10:30:00Z' },
                            { ruc: '20534049286', razon_social: 'Inversiones Beta EIRL', score: 78, tier: 'SILVER', fecha: '2026-04-14T16:45:00Z' },
                            { ruc: '20345067890', razon_social: 'Servicios Gamma SAC', score: 45, tier: 'BRONZE', fecha: '2026-04-12T09:15:00Z' }
                        ]
                    };
                    
                    renderMonthlyChart(demoData.monthly_validations);
                    document.getElementById('totalValidations').textContent = demoData.total_last_30d;
                    document.getElementById('uniqueRUCs').textContent = demoData.unique_rucs_30d;
                    renderTierDistribution(demoData.tier_distribution);
                    renderRecentValidations(demoData.recent_validations);
                    return;
                }
                
                const response = await fetch('https://conflict-zero-api.onrender.com/api/v3/dashboard/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    const monthlyData = data.monthly_validations || [];
                    const total30d = data.verifications_this_month || data.total_last_30d || 0;
                    const uniqueRucs = data.unique_rucs_30d || 0;
                    const tierDist = data.risk_distribution || data.tier_distribution || {};
                    const recent = data.recent_verifications || [];
                    
                    if (monthlyData.length > 0) {
                        renderMonthlyChart(monthlyData);
                    } else {
                        document.getElementById('monthlyChart').innerHTML = '<div style="color: var(--text-muted); font-size: 12px;">Sin datos de historial</div>';
                    }
                    
                    document.getElementById('totalValidations').textContent = total30d;
                    document.getElementById('uniqueRUCs').textContent = uniqueRucs;
                    
                    renderTierDistribution(tierDist);
                    
                    if (recent.length > 0) {
                        renderRecentValidations(recent);
                    } else {
                        document.getElementById('recentTableBody').innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 20px;">Sin validaciones recientes. <a href="/verificar.html" style="color: var(--gold);">Realizar primera verificacion</a></td></tr>';
                    }
                } else {
                    console.error('Dashboard stats error:', response.status);
                    document.getElementById('recentTableBody').innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--danger); padding: 20px;">Error cargando datos</td></tr>';
                }
            } catch (err) {
                console.error('Error loading stats:', err);
                if (typeof Sentry !== 'undefined') {
                    Sentry.captureException(err);
                }
                document.getElementById('recentTableBody').innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--danger); padding: 20px;">Error cargando datos. Intente recargar la pagina.</td></tr>';
            }
        }
        
        function renderMonthlyChart(monthlyData) {
            const chartContainer = document.getElementById('monthlyChart');
            
            if (!monthlyData || monthlyData.length === 0) {
                chartContainer.innerHTML = '<div style="color: var(--text-muted); font-size: 12px;">Sin datos</div>';
                return;
            }
            
            const data = [...monthlyData].reverse();
            const maxValue = Math.max(...data.map(d => d.total), 1);
            
            chartContainer.innerHTML = data.map(item => {
                const height = Math.max((item.total / maxValue) * 100, 4);
                const monthLabel = item.mes.split('-')[1];
                return `
                    <div class="chart-bar" style="height: ${height}%;">
                        <div class="bar-value">${item.total}</div>
                        <div class="bar-label">${monthLabel}</div>
                    </div>
                `;
            }).join('');
        }
        
        function renderTierDistribution(tierData) {
            const container = document.getElementById('tierDistribution');
            
            if (!tierData || Object.keys(tierData).length === 0) {
                container.innerHTML = '<div style="color: var(--text-muted); font-size: 12px;">Sin datos</div>';
                return;
            }
            
            const tiers = ['GOLD', 'SILVER', 'BRONZE', 'RECHAZADO'];
            
            container.innerHTML = tiers.map(tier => {
                const count = tierData[tier] || 0;
                const tierColors = {
                    'GOLD': '#D4AF37',
                    'SILVER': '#C0C0C0',
                    'BRONZE': '#B87333',
                    'RECHAZADO': '#8B0000'
                };
                return `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border);">
                        <div style="display: flex; align-items: center;">
                            <span class="tier-dot ${tier}"></span>
                            <span style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;">${tier}</span>
                        </div>
                        <div style="font-size: 18px; color: ${tierColors[tier]}; font-weight: 500;">${count}</div>
                    </div>
                `;
            }).join('');
        }
        
        function renderRecentValidations(validations) {
            const tbody = document.getElementById('recentTableBody');
            
            if (!validations || validations.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">Sin validaciones recientes</td></tr>';
                return;
            }
            
            tbody.innerHTML = validations.map(v => `
                <tr>
                    <td>${v.ruc}</td>
                    <td>${v.razon_social || 'N/A'}</td>
                    <td>
                        <span class="tier-dot ${v.tier}"></span>
                        ${Math.round(v.score)}
                    </td>
                    <td style="color: var(--text-muted); font-size: 11px;">${v.fecha}</td>
                </tr>
            `).join('');
        }
        
        function logout() {
            console.log('Cerrando sesion...');
            try {
                localStorage.clear();
                console.log('localStorage limpiado');
                window.location.replace('/login.html');
            } catch (e) {
                console.error('Error en logout:', e);
                alert('Error al cerrar sesion. Por favor cierra el navegador.');
            }
        }
        
        async function validarRUC() {
            const ruc = document.getElementById('rucInput').value;
            const resultBox = document.getElementById('resultBox');
            const scoreNum = document.getElementById('scoreNum');
            const token = localStorage.getItem('cz_token');
            
            if (ruc.length !== 11 || !/^\d{11}$/.test(ruc)) {
                alert('Ingrese un RUC valido de 11 digitos numericos');
                return;
            }
            
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.textContent;
            btn.textContent = 'Verificando...';
            btn.disabled = true;
            
            try {
                const response = await fetch(`https://conflict-zero-api.onrender.com/api/v1/consulta-completa/${ruc}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok && data.ruc) {
                    scoreNum.textContent = Math.round(data.score || 0);
                    resultBox.classList.add('visible');
                    saveToHistory(data);
                } else {
                    alert(data.message || 'RUC no encontrado');
                }
            } catch (err) {
                console.error(err);
                alert('Error de conexion');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
        
        function saveToHistory(data) {
            const history = JSON.parse(localStorage.getItem('cz_validations') || '[]');
            history.unshift({
                ruc: data.ruc,
                razon_social: data.razon_social,
                score: data.score,
                tier: data.tier,
                fecha: new Date().toISOString()
            });
            if (history.length > 20) history.pop();
            localStorage.setItem('cz_validations', JSON.stringify(history));
        }
        
        function invitarSubcontratista() {
            console.log('[DEBUG] invitarSubcontratista() llamado');
            const token = localStorage.getItem('cz_token');
            const ruc = prompt('Ingrese el RUC del subcontratista a invitar (11 digitos):');
            if (!ruc || ruc.length !== 11) {
                alert('RUC invalido');
                return;
            }
            
            const email = prompt('Ingrese el email del subcontratista:');
            if (!email || !email.includes('@')) {
                alert('Email invalido');
                return;
            }
            
            console.log('[DEBUG] Creando invitacion para:', {ruc, email});
            
            fetch('https://conflict-zero-api.onrender.com/api/v3/invitations', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ email, ruc_invitado: ruc })
            })
            .then(r => {
                console.log('[DEBUG] Response status:', r.status);
                return r.json();
            })
            .then(data => {
                console.log('[DEBUG] Response data:', data);
                if (data.success) {
                    alert(`Invitacion creada!\n\nEmail: ${email}\nToken: ${data.invitation.token}\n\nEl subcontratista debe registrarse en:\nhttps://czperu.com/registro.html?token=${data.invitation.token}`);
                } else {
                    alert('Error: ' + (data.message || 'No se pudo crear invitacion'));
                }
            })
            .catch(err => {
                console.error('[DEBUG] Error:', err);
                alert('Error de conexion: ' + err.message);
            });
        }
        
        async function exportarHistorial() {
            const token = localStorage.getItem('cz_token');
            const btn = document.querySelector('.btn-secondary');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Descargando...';
            btn.disabled = true;
            
            try {
                const response = await fetch('https://conflict-zero-api.onrender.com/api/v3/export/validations', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    downloadBlob(blob, `validaciones_${new Date().toISOString().split('T')[0]}.csv`);
                    return;
                }
            } catch (e) {
                console.log('API export no disponible, usando localStorage');
            }
            
            const history = JSON.parse(localStorage.getItem('cz_validations') || '[]');
            if (history.length === 0) {
                alert('No hay validaciones en el historial');
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }
            
            let csv = 'Fecha,RUC,Razon Social,Score,Tier\n';
            history.forEach(h => {
                csv += `${h.fecha},${h.ruc},${h.razon_social || ''},${h.score || 0},${h.tier || ''}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            downloadBlob(blob, `validaciones_${new Date().toISOString().split('T')[0]}.csv`);
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
        
        function downloadBlob(blob, filename) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
        
        // ============================================================
        // INICIALIZACION (corre cuando el DOM esta listo)
        // ============================================================
        
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('[DEBUG] Dashboard loading...');
            
            // Check for demo mode
            const urlParams = new URLSearchParams(window.location.search);
            const isDemo = urlParams.get('demo') === 'true';
            
            if (isDemo) {
                console.log('[DEBUG] MODO DEMO activado');
                const demoUser = {
                    company_name: 'CONSTRUCTORA DEMO S.A.C.',
                    email: 'demo.cliente@example.com',
                    plan_type: 'Professional'
                };
                localStorage.setItem('cz_user', JSON.stringify(demoUser));
                localStorage.setItem('cz_token', 'demo-token-for-testing');
            }
            
            // Check auth and load dashboard
            const token = localStorage.getItem('cz_token');
            const userData = JSON.parse(localStorage.getItem('cz_user') || '{}');
            
            console.log('[DEBUG] Token:', token ? 'Presente' : 'No hay token');
            console.log('[DEBUG] UserData:', userData);
            
            if (!token) {
                console.log('[DEBUG] Redirigiendo a login - no hay token');
                window.location.href = '/login.html';
                return; // Este return esta DENTRO de una funcion — es legal
            }
            
            // Mostrar nombre inmediatamente desde localStorage
            if (userData.company_name) {
                document.getElementById('companyName').textContent = userData.company_name;
            } else if (userData.email) {
                document.getElementById('companyName').textContent = userData.email;
            } else {
                document.getElementById('companyName').textContent = 'Usuario';
            }
            
            // Si es demo, mostrar badge
            if (isDemo) {
                const planBadge = document.querySelector('.plan-badge');
                if (planBadge) {
                    planBadge.textContent = 'MODO DEMO';
                    planBadge.style.background = 'rgba(197, 160, 89, 0.2)';
                }
            }
            
            // Mostrar debug info
            document.getElementById('debugInfo').innerHTML = `
                <strong>Debug Info:</strong><br>
                Token: ${token ? 'Presente (' + token.substring(0, 20) + '...)' : 'No hay token'}<br>
                Email: ${userData.email || 'N/A'}<br>
                Company: ${userData.company_name || 'N/A'}<br>
                Plan: ${userData.plan_type || 'N/A'}<br>
                <button onclick="localStorage.clear(); alert('localStorage limpiado'); location.reload();" style="margin-top: 8px; padding: 4px 8px; font-size: 10px; background: #444; border: none; color: #fff; cursor: pointer;">Limpiar Sesion</button>
            `;
            
            // Load user info and stats
            try {
                await loadUserInfo(token);
                await loadDashboardStats(token, isDemo);
            } catch (err) {
                console.error('Error cargando dashboard:', err);
            }
        });
    </script>
</body>
</html>
