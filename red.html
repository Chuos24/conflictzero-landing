<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red de Cumplimiento - Conflict Zero</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0A0A0F;
            --bg-card: #12121A;
            --gold: #C5A059;
            --gold-light: #D4AF37;
            --text: #F5F5F0;
            --text-muted: #A0A0A0;
            --border: #2A2A2E;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            background: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
        }
        
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 20px 40px;
            background: rgba(10, 10, 15, 0.95);
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo-icon {
            width: 36px; height: 36px;
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg {
            width: 20px; height: 20px;
            stroke: var(--gold);
            stroke-width: 1.5;
            fill: none;
        }
        
        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
        }
        
        .header-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        .container {
            position: fixed;
            top: 76px; left: 0; right: 340px; bottom: 0;
        }
        
        #graph { width: 100%; height: 100%; }
        
        .sidebar {
            position: fixed;
            top: 76px; right: 0;
            width: 340px; bottom: 0;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            padding: 30px;
            overflow-y: auto;
        }
        
        .sidebar h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
        }
        
        .resumen-card {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .resumen-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 13px;
        }
        
        .resumen-label { color: var(--text-muted); }
        .resumen-value { color: var(--text); }
        
        .tier-legend h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        
        .tier-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 12px;
        }
        
        .tier-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 12px;
        }
        
        .controls {
            position: fixed;
            bottom: 30px; left: 30px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        
        .control-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 24px;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            background: var(--gold);
            color: var(--bg-dark);
        }
        
        .tooltip {
            position: absolute;
            background: var(--bg-card);
            border: 1px solid var(--gold);
            padding: 20px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            max-width: 280px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        
        .tooltip-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: var(--gold);
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .tooltip-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .tooltip-label { color: var(--text-muted); }
        .tooltip-value { color: var(--text); }
        .tooltip-score { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--gold); }
        
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .loading-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 24px;
        }
        
        .loading-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: var(--text);
            margin-bottom: 16px;
        }
        
        .spinner {
            width: 40px; height: 40px;
            border: 1px solid var(--border);
            border-top-color: var(--gold);
            margin-top: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Node styles */
        .node-circle { cursor: pointer; }
        .node-score { font-family: 'Inter', sans-serif; font-weight: 600; }
        .node-label { font-family: 'Inter', sans-serif; font-weight: 300; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div class="logo-text">Conflict Zero</div>
        </div>
        <div class="header-title">Red de Cumplimiento</div>
    </header>
    
    <div class="container"><svg id="graph"></svg></div>
    
    <div class="sidebar">
        <h2>Resumen de Red</h2>
        <div class="resumen-card">
            <div class="resumen-item"><span class="resumen-label">Subcontratistas</span><span class="resumen-value" id="total-nodos">6</span></div>
            <div class="resumen-item"><span class="resumen-label">Score Promedio</span><span class="resumen-value" id="score-promedio">59.3</span></div>
            <div class="resumen-item"><span class="resumen-label">Riesgo</span><span class="resumen-value" id="riesgo-red">MEDIO</span></div>
        </div>
        
        <div class="tier-legend">
            <h3>Niveles</h3>
            <div class="tier-item"><div class="tier-dot" style="background: #D4AF37;"></div><span>Gold (90-100)</span></div>
            <div class="tier-item"><div class="tier-dot" style="background: #C0C0C0;"></div><span>Silver (70-89)</span></div>
            <div class="tier-item"><div class="tier-dot" style="background: #B87333;"></div><span>Bronze (30-69)</span></div>
            <div class="tier-item"><div class="tier-dot" style="background: #8B0000;"></div><span>Rechazado (0-29)</span></div>
        </div>
    </div>
    
    <div class="controls">
        <button class="control-btn" onclick="resetZoom()">Resetear</button>
        <button class="control-btn" onclick="toggleAnimation()">Pausar</button>
    </div>
    
    <div class="tooltip" id="tooltip"></div>
    
    <div class="loading" id="loading">
        <div class="loading-logo">Conflict Zero</div>
        <div class="loading-text">Red de Cumplimiento</div>
        <div class="spinner"></div>
    </div>

    <script>
        const demoData = {
            centro: { ruc: '20529400790', nombre: 'ZAMORA JARA', score: 88, tier: 'SILVER', color: '#C0C0C0' },
            nodos: [
                { ruc: '20501234567', nombre: 'ELECTRICISTAS DEL NORTE', score: 85, tier: 'SILVER', color: '#C0C0C0' },
                { ruc: '20512345678', nombre: 'INGENIERIA ELECTRICA PERU', score: 45, tier: 'BRONZE', color: '#B87333' },
                { ruc: '20523456789', nombre: 'CABLEADO INDUSTRIAL SUR', score: 95, tier: 'GOLD', color: '#D4AF37' },
                { ruc: '20534567890', nombre: 'LUZ Y FUERZA CAJAMARCA', score: 22, tier: 'RECHAZADO', color: '#8B0000' },
                { ruc: '20545678901', nombre: 'INSTALACIONES FERRENAFE', score: 72, tier: 'SILVER', color: '#C0C0C0' },
                { ruc: '20556789012', nombre: 'SISTEMAS ELECTRICOS NORTE', score: 38, tier: 'BRONZE', color: '#B87333' }
            ],
            links: [
                { source: '20529400790', target: '20501234567' },
                { source: '20529400790', target: '20512345678' },
                { source: '20529400790', target: '20523456789' },
                { source: '20529400790', target: '20534567890' },
                { source: '20529400790', target: '20545678901' },
                { source: '20501234567', target: '20556789012' }
            ]
        };
        
        const RUC = '20529400790';
        let simulation;
        
        function getNodeRadius(d) {
            if (d.ruc === RUC) return 35;
            if (d.tier === 'GOLD') return 28;
            if (d.tier === 'SILVER') return 24;
            if (d.tier === 'BRONZE') return 22;
            return 20;
        }
        
        function getTextColor(tier) {
            if (tier === 'GOLD' || tier === 'SILVER') return '#0A0A0F';
            return '#F5F5F0';
        }
        
        function renderGraph() {
            document.getElementById('loading').style.display = 'none';
            
            const data = demoData;
            const container = document.getElementById('graph');
            const width = window.innerWidth - 340;
            const height = window.innerHeight - 76;
            
            container.setAttribute('width', width);
            container.setAttribute('height', height);
            
            const nodes = [data.centro, ...data.nodos];
            const links = data.links.map(l => ({ source: l.source, target: l.target }));
            
            const svg = d3.select('#graph');
            const g = svg.append('g');
            
            // Zoom
            svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', (e) => g.attr('transform', e.transform)));
            
            // Simulation
            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.ruc).distance(150))
                .force('charge', d3.forceManyBody().strength(-500))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => getNodeRadius(d) + 10));
            
            // Gradient definitions
            const defs = svg.append('defs');
            
            const grads = {
                GOLD: ['#F4E8C1', '#D4AF37', '#8B6914'],
                SILVER: ['#FFFFFF', '#C0C0C0', '#707070'],
                BRONZE: ['#E8B896', '#B87333', '#6B4423'],
                RECHAZADO: ['#CC4444', '#8B0000', '#4A0000']
            };
            
            Object.entries(grads).forEach(([name, colors]) => {
                const grad = defs.append('radialGradient').attr('id', 'grad' + name).attr('cx', '30%').attr('cy', '30%');
                grad.append('stop').attr('offset', '0%').attr('stop-color', colors[0]);
                grad.append('stop').attr('offset', '50%').attr('stop-color', colors[1]);
                grad.append('stop').attr('offset', '100%').attr('stop-color', colors[2]);
            });
            
            // Links
            const link = g.append('g').selectAll('line').data(links).enter().append('line')
                .attr('stroke', '#C5A059')
                .attr('stroke-width', 1)
                .attr('stroke-opacity', 0.3);
            
            // Nodes group
            const node = g.append('g').selectAll('g').data(nodes).enter().append('g')
                .call(d3.drag()
                    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));
            
            // Circles
            node.append('circle')
                .attr('r', d => getNodeRadius(d))
                .attr('fill', d => `url(#grad${d.tier})`)
                .attr('stroke', d => d.ruc === RUC ? '#F5F5F0' : 'rgba(197,160,89,0.5)')
                .attr('stroke-width', d => d.ruc === RUC ? 2 : 1)
                .attr('class', 'node-circle')
                .on('mouseover', (e, d) => showTooltip(e, d))
                .on('mouseout', hideTooltip);
            
            // Score text - CENTERED
            node.append('text')
                .attr('text-anchor', 'middle')
                .attr('dy', '0.35em')
                .text(d => Math.round(d.score))
                .style('font-size', d => d.ruc === RUC ? '16px' : '13px')
                .style('font-weight', '600')
                .style('fill', d => getTextColor(d.tier))
                .style('pointer-events', 'none')
                .attr('class', 'node-score');
            
            // Name label
            node.append('text')
                .attr('text-anchor', 'middle')
                .attr('dy', d => getNodeRadius(d) + 16)
                .text(d => d.nombre.length > 22 ? d.nombre.substring(0, 22) + '...' : d.nombre)
                .style('font-size', d => d.ruc === RUC ? '11px' : '9px')
                .style('fill', '#F5F5F0')
                .style('pointer-events', 'none')
                .attr('class', 'node-label');
            
            // Simulation tick
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }
        
        function showTooltip(event, d) {
            const t = document.getElementById('tooltip');
            t.innerHTML = `
                <div class="tooltip-title">${d.nombre}</div>
                <div class="tooltip-row"><span class="tooltip-label">RUC</span><span class="tooltip-value">${d.ruc}</span></div>
                <div class="tooltip-row"><span class="tooltip-label">Score</span><span class="tooltip-score">${d.score}</span></div>
                <div class="tooltip-row"><span class="tooltip-label">Tier</span><span class="tooltip-value" style="color:${d.color}">${d.tier}</span></div>
            `;
            t.style.left = (event.pageX + 15) + 'px';
            t.style.top = (event.pageY - 10) + 'px';
            t.style.opacity = 1;
        }
        
        function hideTooltip() {
            document.getElementById('tooltip').style.opacity = 0;
        }
        
        function resetZoom() {
            d3.select('#graph').transition().duration(500).call(d3.zoom().transform, d3.zoomIdentity);
        }
        
        function toggleAnimation() {
            if (simulation) {
                if (simulation.alpha() > 0) simulation.stop();
                else simulation.restart();
            }
        }
        
        // Load
        setTimeout(renderGraph, 500);
        
        window.addEventListener('resize', () => {
            d3.select('#graph').selectAll('*').remove();
            renderGraph();
        });
    </script>
</body>
</html>
